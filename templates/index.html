{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}" />
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        #div1{
            height: 28vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }
        #form1>input{
            height: 30px;
            width: 70vh;
        }
         #form1>button{
            height: 30px;
            width: 20vh;
         }
        #div2{
            /* border: 2px solid black; */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        #ul1{
            /* border: 2px solid red; */
            display: flex;
            gap: 10px;
            flex-direction: column;
            justify-content: space-around;
        }
        #ul1>li{
            /* border: 2px solid green; */
            padding: 20px 10px;
        }
    </style>
  </head>
  <body>
    <div id="div1">
      <h1>Write your activities</h1>
      <form id="form1" action="add" method="post">
        {% csrf_token %}
        <input type="text" name="activity" placeholder="Enter your activity" />
        <button type="submit">Add Activity</button>
      </form>
    </div>

    <div id="div2">
      <h1>Activities:</h1>
      <ol id="ul1" type="1">
        {% for activity in activities %}
        <li>{{ activity }}
            <form action="delete" method="post" style="display: inline;">
                {% csrf_token %}
                <input type="hidden" name="index" value="{{ forloop.counter0 }}">
                <button type="submit">delete</button>
            </form>
            <form action="update" method="post" style="display: inline;">
                {% csrf_token %}
                <input type="hidden" name="index" value="{{ forloop.counter0 }}">
                <input id="input-{{ forloop.counter0 }}" type="text" name="new_activity" value="{{ activity }}" style="display: none;">
                <button type="button" onclick='inputFun({{ forloop.counter0 }})'>update</button>
                 <button type="submit" id="save-{{ forloop.counter0 }}" style="display: none;">save</button>
            </form>
        </li>
        {% empty %}
        <p>No activities stored yet</p>
        {% endfor %}
      </ol>
    </div>


    <script>
       
        function inputFun(index){
             input1 = document.getElementById('input-' + index);
             input2 = document.getElementById('save-' + index);
            input1.style.cssText = "display:inline";
            input2.style.cssText = "display:inline";
        }
    </script>
  </body>
</html>
